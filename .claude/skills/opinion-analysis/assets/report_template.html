<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舆情分析报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #fafbfc;
  --surface: #ffffff;
  --border: #e8ecf1;
  --text: #2c3e50;
  --text-secondary: #7f8c9b;
  --text-muted: #a3b1bf;
  --primary: #4a90d9;
  --primary-light: #e3f0fc;
  --green: #27ae60;
  --green-bg: #eafaf1;
  --orange: #e67e22;
  --orange-bg: #fdf2e9;
  --red: #c0392b;
  --red-bg: #fce4e4;
}
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.wrap { max-width: 1060px; margin: 32px auto; padding: 0; }

/* ─── header ─── */
.hdr { padding: 0 0 20px; border-bottom: 2px solid var(--primary); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: baseline; }
.hdr h1 { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.hdr-meta { font-size: 13px; color: var(--text-secondary); display: flex; gap: 16px; align-items: center; }
.hdr-meta a { color: var(--primary); text-decoration: none; }
.hdr-meta a:hover { text-decoration: underline; }

/* ─── summary ─── */
.summary { display: flex; gap: 0; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.sum-item { flex: 1; padding: 14px 20px; text-align: center; }
.sum-item + .sum-item { border-left: 1px solid var(--border); }
.sum-num { font-size: 28px; font-weight: 700; line-height: 1.1; }
.sum-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.sum-item.total .sum-num { color: var(--text); }
.sum-item.ok .sum-num { color: var(--green); }
.sum-item.warn .sum-num { color: var(--orange); }
.sum-item.err .sum-num { color: var(--red); }

/* ─── toolbar ─── */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.tb-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
.tb-select { font-size: 13px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; }
.tb-select:focus { outline: none; border-color: var(--primary); }
.tb-select:disabled { opacity: .45; cursor: default; }
.tb-search { margin-left: auto; }
.tb-search input { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; width: 180px; transition: width .2s; }
.tb-search input:focus { outline: none; border-color: var(--primary); width: 220px; }
.tb-path { font-size: 13px; color: var(--text-secondary); }
.tb-path .p { color: var(--primary); cursor: pointer; }
.tb-path .p:hover { text-decoration: underline; }
.tb-path .sep { color: var(--text-muted); margin: 0 4px; }

/* ─── charts ─── */
.charts-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
.charts-hdr { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); }
.charts-hdr h2 { font-size: 14px; font-weight: 700; }
.charts-hdr .tog { font-size: 13px; color: var(--primary); cursor: pointer; }
.charts-body { padding: 20px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
.charts-body.hide { display: none; }
.ch-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.ch-wrap { height: 300px; position: relative; }

/* ─── table ─── */
.tbl-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tbl-hdr { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.tbl-hdr h2 { font-size: 14px; font-weight: 700; }
.tbl-hdr .cnt { font-size: 12px; color: var(--text-secondary); }
.tbl-scroll { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
.tbl col:nth-child(1) { width: 36px; }
.tbl col:nth-child(2) { width: 35%; }
.tbl col:nth-child(3) { width: 20%; }
.tbl col:nth-child(4) { width: auto; }
.tbl th { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: left; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
.tbl td { font-size: 13px; padding: 9px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.tbl td:first-child { text-align: left; }
.tbl th:first-child { text-align: left; padding: 10px 4px 10px 20px; }
.tbl tbody tr:hover { background: var(--primary-light); }
.tbl tbody tr:last-child td { border-bottom: none; }

/* table content helpers */
.prob { color: var(--primary); cursor: pointer; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
.prob:hover { text-decoration: underline; }
.cls { font-size: 13px; }
.cls .c { color: var(--primary); cursor: pointer; font-weight: 500; }
.cls .c:hover { text-decoration: underline; }
.cls .dot { color: var(--text-muted); margin: 0 2px; }
.cls .unk { color: var(--orange); cursor: pointer; font-weight: 500; }
.cls .unk:hover { text-decoration: underline; }
.cls .fail { color: var(--text-muted); }
.rsn { font-size: 12px; color: var(--text-secondary); line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; cursor: default; }

/* ─── pagination ─── */
.pgn { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 12px; border-top: 1px solid var(--border); }
.pgn button { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text-secondary); cursor: pointer; }
.pgn button:hover:not(:disabled) { background: var(--bg); }
.pgn button:disabled { opacity: .35; cursor: default; }
.pgn button.act { background: var(--primary); color: #fff; border-color: var(--primary); }
.pgn .info { font-size: 12px; color: var(--text-muted); }

/* ─── empty ─── */
.empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }
.empty.hidden { display: none; }

/* ─── modal ─── */
.mdl-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 999; }
.mdl-bg.hidden { display: none; }
.mdl { background: var(--surface); border-radius: 12px; width: 760px; max-width: 90vw; max-height: 80vh; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.mdl-top { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.mdl-top h3 { font-size: 15px; font-weight: 700; }
.mdl-x { font-size: 16px; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.mdl-x:hover { background: var(--bg); color: var(--text); }
.mdl-in { padding: 24px; overflow-y: auto; max-height: calc(80vh - 52px); }
.mdl-cls { padding: 14px 18px; background: var(--primary-light); border-radius: 8px; margin-bottom: 16px; }
.mdl-cls .l { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
.mdl-cls .v { font-size: 15px; color: var(--primary); font-weight: 700; margin-top: 2px; }
.mdl-rsn { padding: 14px 18px; background: #f7f9fb; border-radius: 8px; margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.mdl-rsn .l { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
.mdl-tbl { width: 100%; border-collapse: collapse; }
.mdl-tbl th { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: left; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); }
.mdl-tbl td { font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <h1>舆情分析报告</h1>
  <div class="hdr-meta">
    <span>{{GENERATED_TIME}}</span>
    {{IF_EXCEL_FILENAME}}<a href="{{EXCEL_FILENAME}}" download>下载原始数据</a>{{ENDIF_EXCEL_FILENAME}}
  </div>
</div>

<div class="summary">
  <div class="sum-item total"><div class="sum-num">{{TOTAL}}</div><div class="sum-label">总数据</div></div>
  <div class="sum-item ok"><div class="sum-num">{{CLASSIFIED}}</div><div class="sum-label">已分类</div></div>
  <div class="sum-item warn"><div class="sum-num">{{UNKNOWN_ISSUE}}</div><div class="sum-label">未知问题</div></div>
  <div class="sum-item err"><div class="sum-num">{{INFER_FAILED}}</div><div class="sum-label">失败</div></div>
</div>

<div class="toolbar">
  <span class="tb-label">一级</span><select class="tb-select" id="filter-level1" onchange="onFilterChange('level1')"><option value="">全部</option></select>
  <span class="tb-label">二级</span><select class="tb-select" id="filter-level2" onchange="onFilterChange('level2')" disabled><option value="">全部</option></select>
  <span class="tb-label">三级</span><select class="tb-select" id="filter-level3" onchange="onFilterChange('level3')" disabled><option value="">全部</option></select>
  <span id="filter-path" class="tb-path"></span>
  <div class="tb-search"><input type="text" id="search-input" placeholder="搜索..." onkeyup="onSearch()"></div>
</div>

<div class="charts-card">
  <div class="charts-hdr">
    <h2>数据分布</h2>
    <span class="tog" onclick="toggleCharts()">收起</span>
  </div>
  <div class="charts-body" id="charts-body">
    <div><div class="ch-sub" id="bar-title">一级分类分布</div><div class="ch-wrap"><canvas id="level1Chart"></canvas></div></div>
    <div><div class="ch-sub" id="pie-title">一级分类分布</div><div class="ch-wrap"><canvas id="pieChart"></canvas></div></div>
  </div>
</div>

<div class="tbl-card">
  <div class="tbl-hdr"><h2>详细数据</h2><span class="cnt" id="table-count">0 条</span></div>
  <div class="tbl-scroll">
    <table class="tbl">
      <colgroup><col><col><col><col></colgroup>
      <thead><tr><th>序号</th><th>问题描述</th><th>分类</th><th>推理说明</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div class="pgn" id="pagination"></div>
  <div class="empty hidden" id="empty-state">没有找到匹配的数据</div>
</div>

<div class="mdl-bg hidden" id="modal-overlay" onclick="closeModal()">
  <div class="mdl" onclick="event.stopPropagation()">
    <div class="mdl-top"><h3>数据详情</h3><span class="mdl-x" onclick="closeModal()">✕</span></div>
    <div class="mdl-in" id="modal-body"></div>
  </div>
</div>

</div>

<script id="report-data" type="application/json">{{DETAILS_JSON}}</script>
<script>
const allData = JSON.parse(document.getElementById('report-data').textContent);
let filters = { level1: "", level2: "", level3: "" };
let searchText = "";
let charts = {};
let chartsVisible = true;
let currentPage = 1;
const pageSize = 50;

function getAllOptions() {
  const level1s = {}, level2s = {}, level3s = {};
  allData.forEach(item => {
    if (item.status === "unknown_issue") { level1s["未知问题"] = true; return; }
    if (item.status === "classified") {
      const cls = item.classification;
      level1s[cls.level1] = true; level2s[cls.level2] = true; level3s[cls.level3] = true;
    }
  });
  return { level1s: Object.keys(level1s).sort(), level2s: Object.keys(level2s).sort(), level3s: Object.keys(level3s).sort() };
}

function getAvailableLevel2(level1) {
  const s = {};
  allData.forEach(item => { if (item.status === "classified") { const cls = item.classification; if (!level1 || cls.level1 === level1) s[cls.level2] = true; } });
  return Object.keys(s).sort();
}

function getAvailableLevel3(level1, level2) {
  const s = {};
  allData.forEach(item => { if (item.status === "classified") { const cls = item.classification; if (!level1 || cls.level1 === level1) if (!level2 || cls.level2 === level2) s[cls.level3] = true; } });
  return Object.keys(s).sort();
}

function fillSelect(id, options) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部</option>';
  options.forEach(o => { const e = document.createElement("option"); e.value = o; e.textContent = o; sel.appendChild(e); });
  sel.value = options.includes(cur) ? cur : "";
}

function getFilteredData() {
  return allData.filter(item => {
    if (item.status === "infer_failed") return true;
    if (item.status === "unknown_issue") {
      if (filters.level1 === "未知问题") return true;
      if (filters.level1 || filters.level2 || filters.level3) return false;
      if (searchText && !(item.input || "").toLowerCase().includes(searchText.toLowerCase())) return false;
      return true;
    }
    if (item.status === "classified") {
      const cls = item.classification;
      if (filters.level1 && cls.level1 !== filters.level1) return false;
      if (filters.level2 && cls.level2 !== filters.level2) return false;
      if (filters.level3 && cls.level3 !== filters.level3) return false;
    }
    if (searchText && !(item.input || "").toLowerCase().includes(searchText.toLowerCase())) return false;
    return true;
  });
}

function calcStats(data) {
  const stats = { level1: {}, level2: {}, level3: {} };
  data.forEach(item => {
    if (item.status === "unknown_issue") { stats.level1["未知问题"] = (stats.level1["未知问题"] || 0) + 1; return; }
    if (item.status !== "classified") return;
    const cls = item.classification;
    stats.level1[cls.level1] = (stats.level1[cls.level1] || 0) + 1;
    if (cls.level2) stats.level2[cls.level2] = (stats.level2[cls.level2] || 0) + 1;
    if (cls.level3) stats.level3[cls.level3] = (stats.level3[cls.level3] || 0) + 1;
  });
  return stats;
}

function onFilterChange(src) {
  const s2 = document.getElementById("filter-level2"), s3 = document.getElementById("filter-level3");
  if (src === "level1") {
    filters.level1 = document.getElementById("filter-level1").value;
    if (filters.level1) { fillSelect("filter-level2", getAvailableLevel2(filters.level1)); s2.disabled = false; }
    else { s2.disabled = true; s2.innerHTML = '<option value="">全部</option>'; s3.disabled = true; s3.innerHTML = '<option value="">全部</option>'; }
    filters.level2 = ""; filters.level3 = "";
  }
  if (src === "level2") {
    filters.level2 = s2.value;
    if (filters.level2) { fillSelect("filter-level3", getAvailableLevel3(filters.level1, filters.level2)); s3.disabled = false; }
    else { s3.disabled = true; s3.innerHTML = '<option value="">全部</option>'; }
    filters.level3 = "";
  }
  if (src === "level3") filters.level3 = s3.value;
  currentPage = 1; updateAll();
}

function onSearch() { searchText = document.getElementById("search-input").value; currentPage = 1; updateAll(); }

function clearFilters() {
  filters = { level1: "", level2: "", level3: "" }; searchText = "";
  fillSelect("filter-level1", getAllOptions().level1s);
  document.getElementById("filter-level1").value = "";
  const s2 = document.getElementById("filter-level2"); s2.disabled = true; s2.innerHTML = '<option value="">全部</option>';
  const s3 = document.getElementById("filter-level3"); s3.disabled = true; s3.innerHTML = '<option value="">全部</option>';
  document.getElementById("search-input").value = "";
  currentPage = 1; updateAll();
}

function toggleCharts() {
  chartsVisible = !chartsVisible;
  document.getElementById("charts-body").classList.toggle("hide", !chartsVisible);
  document.querySelector(".tog").textContent = chartsVisible ? "收起" : "展开";
}

function updateBreadcrumb() {
  const el = document.getElementById("filter-path");
  if (!filters.level1 && !filters.level2 && !filters.level3 && !searchText) { el.innerHTML = ""; return; }
  const ps = ["<span class='p' onclick='clearFilters()'>全部</span>"];
  if (filters.level1) ps.push("<span class='p' onclick='clearLevel(1)'>" + filters.level1 + "</span>");
  if (filters.level2) ps.push("<span class='p' onclick='clearLevel(2)'>" + filters.level2 + "</span>");
  if (filters.level3) ps.push("<span class='p' onclick='clearLevel(3)'>" + filters.level3 + "</span>");
  if (searchText) ps.push("<span class='p' onclick='clearFilters()'>搜索:" + searchText + "</span>");
  el.innerHTML = ps.join("<span class='sep'>›</span>");
}

function clearLevel(n) {
  if (n === 1) { filters.level2 = ""; filters.level3 = ""; fillSelect("filter-level2", getAvailableLevel2(filters.level1)); document.getElementById("filter-level2").disabled = !filters.level1; document.getElementById("filter-level2").value = ""; document.getElementById("filter-level3").disabled = true; document.getElementById("filter-level3").innerHTML = '<option value="">全部</option>'; }
  else if (n === 2) { filters.level3 = ""; fillSelect("filter-level3", getAvailableLevel3(filters.level1, filters.level2)); document.getElementById("filter-level3").disabled = !filters.level2; document.getElementById("filter-level3").value = ""; }
  searchText = ""; document.getElementById("search-input").value = ""; currentPage = 1; updateAll();
}

function updateTable() {
  const tbody = document.getElementById("table-body"), empty = document.getElementById("empty-state"), cnt = document.getElementById("table-count"), pgn = document.getElementById("pagination");
  const filtered = getFilteredData();
  cnt.textContent = filtered.length + " 条";
  const totalPages = Math.ceil(filtered.length / pageSize);
  if (currentPage > totalPages) currentPage = totalPages || 1;
  const start = (currentPage - 1) * pageSize, pageData = filtered.slice(start, start + pageSize);
  tbody.innerHTML = "";
  if (filtered.length === 0) { empty.classList.remove("hidden"); pgn.innerHTML = ""; return; }
  empty.classList.add("hidden");
  pageData.forEach((item, i) => {
    const gi = start + i, row = document.createElement("tr");
    let clsHtml = "";
    const cls = item.classification || {};
    if (item.status === "classified") {
      const ps = [];
      if (cls.level1) ps.push("<span class='c' onclick=\"setF1('" + cls.level1 + "')\">" + cls.level1 + "</span>");
      if (cls.level2) ps.push("<span class='dot'>·</span><span class='c' onclick=\"setF2('" + cls.level1 + "','" + cls.level2 + "')\">" + cls.level2 + "</span>");
      if (cls.level3) ps.push("<span class='dot'>·</span><span class='c' onclick=\"setF3('" + cls.level1 + "','" + cls.level2 + "','" + cls.level3 + "')\">" + cls.level3 + "</span>");
      clsHtml = "<span class='cls'>" + ps.join("") + "</span>";
    } else if (item.status === "infer_failed") {
      clsHtml = "<span class='cls'><span class='fail'>推理失败</span></span>";
    } else {
      clsHtml = "<span class='cls'><span class='unk' onclick=\"setF1('未知问题')\">未知问题</span></span>";
    }
    row.innerHTML =
      "<td>" + (gi + 1) + "</td>" +
      "<td><span class='prob' onclick='showDetail(" + gi + ")'>" + item.input + "</span></td>" +
      "<td>" + clsHtml + "</td>" +
      "<td><span class='rsn'>" + (item.reasoning || "") + "</span></td>";
    tbody.appendChild(row);
  });
  updatePagination(filtered.length, totalPages);
}

function setF1(val) {
  filters.level1 = val; filters.level2 = ""; filters.level3 = "";
  document.getElementById("filter-level1").value = val;
  fillSelect("filter-level2", getAvailableLevel2(val)); document.getElementById("filter-level2").disabled = false;
  document.getElementById("filter-level3").disabled = true; document.getElementById("filter-level3").innerHTML = '<option value="">全部</option>';
  currentPage = 1; updateAll();
}
function setF2(l1, l2) {
  filters.level1 = l1; filters.level2 = l2; filters.level3 = "";
  document.getElementById("filter-level1").value = l1;
  fillSelect("filter-level2", getAvailableLevel2(l1)); document.getElementById("filter-level2").disabled = false; document.getElementById("filter-level2").value = l2;
  fillSelect("filter-level3", getAvailableLevel3(l1, l2)); document.getElementById("filter-level3").disabled = false; document.getElementById("filter-level3").value = "";
  currentPage = 1; updateAll();
}
function setF3(l1, l2, l3) {
  filters.level1 = l1; filters.level2 = l2; filters.level3 = l3;
  document.getElementById("filter-level1").value = l1;
  fillSelect("filter-level2", getAvailableLevel2(l1)); document.getElementById("filter-level2").disabled = false; document.getElementById("filter-level2").value = l2;
  fillSelect("filter-level3", getAvailableLevel3(l1, l2)); document.getElementById("filter-level3").disabled = false; document.getElementById("filter-level3").value = l3;
  currentPage = 1; updateAll();
}

function updateCharts() {
  const stats = calcStats(getFilteredData());
  let lvl, title;
  if (filters.level1 && filters.level2 && Object.keys(stats.level3).length > 0) {
    lvl = "level3"; title = "三级分类分布";
  } else if (filters.level1 && Object.keys(stats.level2).length > 0) {
    lvl = "level2"; title = "二级分类分布";
  } else if (Object.keys(stats.level1).length > 0) {
    lvl = "level1"; title = "一级分类分布";
  } else {
    lvl = "level1"; title = "一级分类分布";
    stats.level1 = {"无数据": 0};
  }
  document.getElementById("bar-title").textContent = title;
  document.getElementById("pie-title").textContent = title;
  const labels = Object.keys(stats[lvl]), values = Object.values(stats[lvl]);
  charts.bar.data.labels = labels; charts.bar.data.datasets[0].data = values;
  charts.pie.data.labels = labels; charts.pie.data.datasets[0].data = values;
  charts.bar.update(); charts.pie.update();
}

const COLORS = ["#4a90d9","#8e44ad","#e74c3c","#27ae60","#e67e22","#3498db","#1abc9c","#f39c12","#2c3e50","#d35400","#16a085","#c0392b","#7f8c8d","#2980b9","#9b59b6","#34495e"];

function initCharts() {
  const stats = calcStats(allData);
  charts.bar = new Chart(document.getElementById("level1Chart"), {
    type: "bar",
    data: { labels: Object.keys(stats.level1), datasets: [{ data: Object.values(stats.level1), backgroundColor: COLORS, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: "#2c3e50", cornerRadius: 4, padding: 8 } }, scales: { y: { beginAtZero: true, grid: { color: "#f0f0f0" }, ticks: { font: { size: 11 } } }, x: { grid: { display: false }, ticks: { font: { size: 11 } } } }, onClick: (_, els) => { if (els.length) { const v = charts.bar.data.labels[els[0].index]; if (filters.level1 && filters.level2) { if (getAvailableLevel3(filters.level1, filters.level2).length > 0) setF3(filters.level1, filters.level2, v); } else if (filters.level1) { setF2(filters.level1, v); } else setF1(v); } } }
  });
  charts.pie = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: { labels: Object.keys(stats.level1), datasets: [{ data: Object.values(stats.level1), backgroundColor: COLORS, borderWidth: 2, borderColor: "#fff" }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: "40%", plugins: { legend: { position: "right", labels: { padding: 10, usePointStyle: true, pointStyle: "circle", font: { size: 11 } } }, tooltip: { backgroundColor: "#2c3e50", cornerRadius: 4, padding: 8, callbacks: { label: ctx => { const t = ctx.dataset.data.reduce((a,b)=>a+b,0); return ctx.label + ": " + ctx.raw + "条 (" + Math.round(ctx.raw/t*100) + "%)"; } } } }, onClick: (_, els) => { if (els.length) { const v = charts.pie.data.labels[els[0].index]; if (filters.level1 && filters.level2) { if (getAvailableLevel3(filters.level1, filters.level2).length > 0) setF3(filters.level1, filters.level2, v); } else if (filters.level1) { setF2(filters.level1, v); } else setF1(v); } } }
  });
}

function updateAll() { updateCharts(); updateBreadcrumb(); updateTable(); }

function updatePagination(total, tp) {
  const el = document.getElementById("pagination");
  if (tp <= 1) { el.innerHTML = ""; return; }
  let h = '<button onclick="goToPage(1)"' + (currentPage===1?" disabled":"") + '>首页</button>';
  h += '<button onclick="goToPage('+(currentPage-1)+')"'+(currentPage===1?" disabled":"") + '>上一页</button>';
  const sp = Math.max(1, currentPage-2), ep = Math.min(tp, sp+4);
  for (let p=sp; p<=ep; p++) h += '<button onclick="goToPage('+p+')" class="'+(p===currentPage?"act":"")+'">'+p+'</button>';
  h += '<button onclick="goToPage('+(currentPage+1)+')"'+(currentPage===tp?" disabled":"") + '>下一页</button>';
  h += '<button onclick="goToPage('+tp+')"'+(currentPage===tp?" disabled":"") + '>末页</button>';
  h += '<span class="info">第'+currentPage+'/'+tp+'页</span>';
  el.innerHTML = h;
}

function goToPage(p) {
  const tp = Math.ceil(getFilteredData().length / pageSize);
  if (p<1) p=1; if (p>tp) p=tp; currentPage = p; updateTable();
}

function showDetail(i) {
  const item = getFilteredData()[i], cls = item.classification || {};
  let cv = "";
  if (item.status === "classified") cv = (cls.level1||"") + (cls.level2?"."+cls.level2:"") + (cls.level3?"."+cls.level3:"");
  else if (item.status === "unknown_issue") cv = "未知问题";
  else cv = "推理失败";
  let h = "<div class='mdl-cls'><div class='l'>分类结果</div><div class='v'>" + cv + "</div></div>";
  if (item.reasoning) h += "<div class='mdl-rsn'><div class='l'>推理过程</div>" + item.reasoning + "</div>";
  const raw = item.raw_data || {};
  h += "<table class='mdl-tbl'><thead><tr>";
  for (const k in raw) h += "<th>"+k+"</th>";
  h += "</tr></thead><tbody><tr>";
  for (const k in raw) h += "<td>"+raw[k]+"</td>";
  h += "</tr></tbody></table>";
  document.getElementById("modal-body").innerHTML = h;
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal() { document.getElementById("modal-overlay").classList.add("hidden"); }

document.addEventListener("DOMContentLoaded", () => {
  fillSelect("filter-level1", getAllOptions().level1s);
  initCharts(); updateAll();
});
</script>
</body>
