return { apps: Object.keys(apps).sort(), modules: Object.keys(modules).sort(), pages: Object.keys(pages).sort(), types: Object.keys(types).sort() };
}
function getAvailableModules(app) {
const modules = {};
allData.forEach(item => {
if (item.status === "success") {
const cls = item.classification;
if (!app || cls.app === app) {
modules[cls.module] = true;
}}});
return Object.keys(modules).sort();
}
function getAvailablePages(app, module) {
const pages = {};
allData.forEach(item => {
if (item.status === "success") {
const cls = item.classification;
if (!app || cls.app === app) {
if (!module || cls.module === module) {
pages[cls.page] = true;
}}}});
return Object.keys(pages).sort();
}
function getAvailableTypes(app, module, page) {
const types = {};
allData.forEach(item => {
if (item.status === "success") {
const cls = item.classification;
if (!app || cls.app === app) {
if (!module || cls.module === module) {
if (!page || cls.page === page) {
types[cls.issue_type] = true;
}}}}});
return Object.keys(types).sort();
}

function fillSelect(id, options, placeholder = "е…ЁйғЁ") {
const sel = document.getElementById(id);
const currentValue = sel.value;
sel.innerHTML = "<option value=\"\">" + placeholder + "</option>";
options.forEach(opt => {
const optEl = document.createElement("option");
optEl.value = opt;
optEl.textContent = opt;
sel.appendChild(optEl);
});
if (options.includes(currentValue)) {
sel.value = currentValue;
} else {
sel.value = "";
}
}
function getFilteredData() {
return allData.filter(item => {
if (item.status !== "success") return false;
const cls = item.classification;
if (filters.app && cls.app !== filters.app) return false;
if (filters.module && cls.module !== filters.module) return false;
if (filters.type && cls.issue_type !== filters.type) return false;
if (filters.page && cls.page !== filters.page) return false;
if (searchText) {
const text = (item.input || "").toLowerCase();
if (!text.includes(searchText.toLowerCase())) return false;
}
return true;
});
}
function calcStats(data) {
const stats = { app: {}, module: {}, page: {}, type: {} };
data.forEach(item => {
if (item.status !== "success") return;
const cls = item.classification;
stats.app[cls.app] = (stats.app[cls.app] || 0) + 1;
stats.module[cls.module] = (stats.module[cls.module] || 0) + 1;
stats.page[cls.page] = (stats.page[cls.page] || 0) + 1;
stats.type[cls.issue_type] = (stats.type[cls.issue_type] || 0) + 1;
});
return stats;
}

function updatePagination(total, totalPages) {
const paginationEl = document.getElementById("pagination");
if (totalPages <= 1) {
paginationEl.innerHTML = "";
return;
}
let html = "";
html += `<button onclick="goToPage(1)" ${currentPage === 1 ? "disabled" : ""}>йҰ–йЎө</button>`;
html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>дёҠдёҖйЎө</button>`;
const startPage = Math.max(1, currentPage - 2);
const endPage = Math.min(totalPages, startPage + 4);
for (let p = startPage; p <= endPage; p++) {
html += `<button onclick="goToPage(${p})" class="${p === currentPage ? "active" : ""}">${p}</button>`;
}
html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>дёӢдёҖйЎө</button>`;
html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? "disabled" : ""}>жң«йЎө</button>`;
html += `<span class="page-info">з¬¬ ${currentPage}/${totalPages} йЎөпјҢе…ұ ${total} жқЎ</span>`;
paginationEl.innerHTML = html;
}
function goToPage(page) {
const filtered = getFilteredData();
const totalPages = Math.ceil(filtered.length / pageSize);
if (page < 1) page = 1;
if (page > totalPages) page = totalPages;
currentPage = page;

}
function showDetail(index) {
const filtered = getFilteredData();
const item = filtered[index];
const raw = item.raw_data || {};
const body = document.getElementById("modal-body");
let html = "<table><thead><tr>";
for (const key in raw) {
html += `<th>${key}</th>`;
}
html += "</tr></thead><tbody><tr>";
for (const key in raw) {
html += `<td>${raw[key]}</td>`;
}
html += "</tr></tbody></table>";
body.innerHTML = html;
document.getElementById("modal-overlay").classList.remove("hidden");
}
